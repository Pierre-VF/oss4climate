#
# YAML file configuring the actions to take when releasing to production
#
# > Syntax tips here: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
#
name: Pull request checker

on:
  pull_request

jobs:
  check_pull_request:
    name: check pull request

    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write


    strategy:
      matrix:
        # versions are wrapped in quotes to preserve the exact versions
        # especially numbers that has "0" on right-most side (e.g. 26.0)
        typesense-version: ['30.1']
        typesense-port: ['8108:8108']

    services:
      typesense:
        image: typesense/typesense:${{ matrix.typesense-version }}


    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create UV installation"
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.10"

      # Check and fix the code
      - name: Defining Git identity
        run: |
          git config user.name github_actions
          git config user.email github_actions@pierrevf.consulting

      #- name: Generate requirements files for app
      #  run: |
      #    uv sync --group=app
      #    uv pip freeze --exclude-editable > requirements-app.txt

      - name: Run code cleanup
        run: |
          make code_cleanup || echo "Precommits modified the files"

      - name: Commit changes back
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github_actions
          message: "Automatic code reformatting and requirements update"
          add: "."
          push: true

      # Run and test
      - name: Installing packages
        run: make install

      # From https://typesense.org/docs/guide/github-actions.html
      - name: Start Typesense
        run: |
          docker run -d \
          -p ${{ matrix.typesense-port }} \
          --name typesense \
          -v /tmp/typesense-data:/data \
          -v /tmp/typesense-analytics-data:/analytics-data \
          typesense/typesense:${{ matrix.typesense-version}} \
          --api-key=DUMMY_TYPESENSE_API_KEY \
          --data-dir=/data \
          --enable-search-analytics=true \
          --analytics-dir=/analytics-data  \
          --analytics-flush-interval=60 \
          --analytics-minute-rate-limit=100 \
          --enable-cors

      - name: Wait for Typesense to be healthy
        shell: bash
        run: |
          start_time=$(date +%s)
          timeout=30
          counter=0
          echo "Waiting for Typesense to be healthy..."
          until curl -s http://localhost:8108/health | grep -q '"ok":true'; do
            if [ $counter -eq $timeout ]; then
              echo "Timed out waiting for Typesense to be healthy"
              exit 1
            fi
            sleep 1
            counter=$((counter + 1))
          done
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "Typesense healthcheck elapsed: ${elapsed}s"

      - name: Run code test
        run: make test
        env:
          TYPESENSE_API_KEY: DUMMY_TYPESENSE_API_KEY
          TYPESENSE_HOST: http://typesense:8108
