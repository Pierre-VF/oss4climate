#
# YAML file configuring the actions to take when releasing to production
#
# > Syntax tips here: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions
#
name: Updating the data

on:
  workflow_dispatch:
    logLevel:
      description: 'Log level'
      required: true
      default: 'warning'
      type: choice
      options:
        - info
        - warning
        - debug
  schedule:
    - cron: '25 5 * * TUE'

jobs:
  build-and-run-discovery:
    name: Discover new sources

    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    concurrency:
      group: ${{ github.workflow }}-discovery
      cancel-in-progress: true

    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Create UV installation"
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.17"

      - name: Installing packages
        run: uv sync --group=scripts --group=app

      - name: Running discovery
        run: make discover
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skipping authentication on Gitlab for now
          # GITLAB_ACCESS_TOKEN: ${{ secrets.GITLAB_ACCESS_TOKEN }}

      - name: Cleaning up the code
        run: |
          make code_cleanup || echo "Precommits modified the files"

      - name: Defining Git identity
        run: |
          git config user.name github_actions
          git config user.email github_actions@pierrevf.com

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "index-update/${{ github.run_id }}"
          base: "main"
          title: "Updating index"
