<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            OSS4Climate - Open-source search for climate applications
        {% endblock %}
    </title>
    <link href="{{ URL_BASE }}/static/css/styles-v2.css?version={{ APP_VERSION }}" rel="stylesheet">
    {% if UMAMI_SITE_ID != "" %}
        <script defer src="https://cloud.umami.is/script.js" data-website-id="{{ UMAMI_SITE_ID }}"></script>
        <!-- <script defer src="https://cloud.umami.is/script.js" integrity="sha384-DCWdwYp9BA8848i6w0Y5RQh8ANWh1jp1+NjJ/a+jqFZi1nvw6st1t+bFQ9+hhNXe" crossorigin="anonymous" data-website-id="{{ UMAMI_SITE_ID }}"></script> -->
    {% endif %}
    <link rel="canonical" href="{{ canonical_url }}">

    {# Theme CSS variables - dynamically generated from theme.py #}
    <style>
        :root {
            {{ THEME_CSS }}
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-hint" onclick="toggleNav()">☰</div>
        <div class="nav-links" id="navLinks">
            <a href="/ui/search">Search</a>
            <a href="/ui/about">About</a>
            <a href="/ui/privacy">Privacy</a>
            <a href="{{ URL_FEEDBACK_FORM }}">Feedback</a>
            <a href="{{ URL_CODE_REPOSITORY }}">
                <svg data-component="Octicon" aria-hidden="true" focusable="false" class="octicon octicon-mark-github" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" display="inline-block" overflow="visible" style="vertical-align:text-bottom">
                    <path d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943">
                    </path>
                </svg>
            </a>
            <a href="../api/docs">API</a>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <script>
        function toggleNav() {
            const navLinks = document.getElementById('navLinks');
            navLinks.style.display = navLinks.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
